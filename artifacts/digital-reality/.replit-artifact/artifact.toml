kind = "mobile"
previewPath = "/"
title = "Digital Reality - Project Management"
version = "1.0.0"
id = "artifacts/digital-reality"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25616

[services.development]
run = "pnpm --filter @workspace/digital-reality run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-reality", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/digital-reality", "run", "serve" ]

[services.env]
PORT = "25616"
BASE_PATH = "/"
